<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="Din personliga gymtracker" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gymbanan" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="icon" href="/favicon-32.png" sizes="32x32" />
    <link rel="icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/manifest.json" id="app-manifest" />

    <!-- Synkront: använd admin-manifest om vi är på /admin-sidan.
         Detta körs INNAN React laddas så att Safari läser rätt manifest
         när användaren trycker 'Lägg till på hemskärmen'. -->
    <script>
      (function() {
        if (window.location.pathname.startsWith('/admin')) {
          var link = document.getElementById('app-manifest');
          if (link) link.setAttribute('href', '/manifest-admin.json');
          var appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (appleTitle) appleTitle.setAttribute('content', 'Gym Admin');
          document.title = 'Gymbanan Admin';
        }
      })();
    </script>

    <title>Gymbanan</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
